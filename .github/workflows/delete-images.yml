name: Delete Images and PDF

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

# 强制 Node.js 24，彻底消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  clean-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须加，解决 exit code 128
    steps:
      - uses: actions/checkout@v4

      # 删除 PNG
      - name: Delete PNG files
        run: find . -maxdepth 1 -name "*.png" -delete && echo "✅ PNG 已删除"

      # 删除指定 PDF
      - name: Delete target PDF
        run: find . -maxdepth 1 -name "*校外人员及车辆进校登记*.pdf" -delete && echo "✅ PDF 已删除"

      # 提交（稳定无错版）
      - name: Commit changes
        run: |
          git config --global user.name "actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "clean: auto delete files" || true
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
