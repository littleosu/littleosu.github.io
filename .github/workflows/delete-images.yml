name: Delete Images and PDF

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  clean-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 删除 PNG
      - name: Delete PNG files
        run: |
          find . -maxdepth 1 -type f -name "*.png" -delete
          echo "✅ 已删除根目录所有 PNG 文件"

      # 删除指定 PDF
      - name: Delete target PDF files
        run: |
          find . -maxdepth 1 -type f -name "*校外人员及车辆进校登记*.pdf" -delete
          echo "✅ 已删除根目录匹配关键词的 PDF 文件"

      # 提交变更（修复版，无参数错误）
      - name: Commit & Push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "chore: 自动清理图片与PDF文件" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
