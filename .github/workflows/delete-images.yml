name: Delete Auto Upload Screenshots
on:
  workflow_dispatch:

jobs:
  delete-screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete 已完结_ and 进行中_ png files
        run: |
          rm -f 已完结_*.png
          rm -f 进行中_*.png

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -A
          git commit -m "批量删除自动上传的已完结/进行中截图"
          git push
