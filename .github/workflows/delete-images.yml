name: Delete Images and PDF

# 触发：手动 + 每周六 0 点（北京时间）
on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * 5'  # 每周六 0 点（北京时间）

# 消除 Node.js 20 警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  clean-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 解决推送权限错误
    steps:
      - uses: actions/checkout@v4

      # 删除根目录 PNG
      - name: Delete PNG files
        run: find . -maxdepth 1 -type f -name "*.png" -delete && echo "✅ 已删除 PNG"

      # 删除指定关键词 PDF
      - name: Delete target PDF
        run: find . -maxdepth 1 -type f -name "*校外人员及车辆进校登记*.pdf" -delete && echo "✅ 已删除 PDF"

      # 提交并推送
      - name: Commit and push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "clean: 自动清理文件" || true
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
