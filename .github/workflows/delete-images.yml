name: Delete Auto Upload Screenshots
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  delete-images:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 直接消除警告
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 删除目标图片
        run: |
          rm -f 已完结_*.png
          rm -f 进行中_*.png

      - name: 提交并推送
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "安全删除已完结/进行中截图"
          git push
