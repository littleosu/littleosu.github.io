name: Delete Images and PDF

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

# 强制使用 Node.js 24，消除警告 ✅
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  clean-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 删除根目录 PNG
      - name: Delete PNG files
        run: |
          find . -maxdepth 1 -type f -name "*.png" -delete
          echo "✅ 已删除根目录所有 PNG 文件"

      # 删除包含关键词的 PDF（你要的功能）
      - name: Delete target PDF files
        run: |
          find . -maxdepth 1 -type f -name "*校外人员及车辆进校登记*.pdf" -delete
          echo "✅ 已删除根目录匹配关键词的 PDF 文件"

      # 提交变更
      - name: Commit and push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref || github.ref }}
          message: "chore: 自动清理图片与PDF文件"
